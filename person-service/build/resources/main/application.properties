#подключения к бд
spring.datasource.url=jdbc:postgresql://localhost:5432/person_service
spring.datasource.username=person_service
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

#аlyway
spring.jpa.hibernate.ddl-auto=none
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.user=person_service
spring.flyway.password=admin
spring.flyway.url=jdbc:postgresql://localhost:5432/person_service